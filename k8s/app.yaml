apiVersion: v1
kind: Namespace
metadata:
  name: k3s-sample
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k3s-sample
  namespace: k3s-sample
  labels:
    app.kubernetes.io/name: k3s-sample
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: k3s-sample
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k3s-sample
    spec:
      containers:
        - name: app
          image: ghcr.io/xrellana/k3s-sample:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: APP_VERSION
              value: "dev"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k3s-sample
  namespace: k3s-sample
  labels:
    app.kubernetes.io/name: k3s-sample
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: k3s-sample
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k3s-sample
  namespace: k3s-sample
spec:
  rules:
    - host: k3s-sample.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k3s-sample
                port:
                  name: http
